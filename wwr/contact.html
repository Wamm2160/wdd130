<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Rapid Rush Rafting</title>

    <meta name="description"
      content="Contact Rapid Rush Rafting for reservations, questions, trip information, and customer support.">

    <meta name="author" content="Wilson Macías">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rapid Rush Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>

        <h1>White Water Rafting Company</h1>

        <section class="company-info">
            <h2>Company Information</h2>

            <p>81 Felipe Angeles Street</p>
            <p>San Jose el Alto, Queretaro</p>
            <p>+52 446 101 7521</p>
            <p>info@raftingqro.com</p>
        </section>

        <section class="contact-layout">

            <div class="map">
                <iframe
                  src="
                  https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3733.508455147048!2d-100.38029989877845!3d20.648883193488825!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2smx!4v1780752957845!5m2!1ses!2smx"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form>

                <label for="fullname">Name</label>
                <input type="text" id="fullname" name="fullname">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <div class="radio-group">
                    <p>Message Purpose</p>

                    <label>
                        <input type="radio" id="general" name="purpose" value="general">
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" id="website" name="purpose" value="website">
                        Website Suggestion
                    </label>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <label for="newsletter">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/employee1.jpg" alt="employee">
                    <figcaption>Sales Agent</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="employee">
                    <figcaption>Security Supervisor</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="employee">
                    <figcaption>Customer Service</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>© 2026 Rapid Rush Rafting | Wilson Macías</p>


        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn">
            </a>

        </nav>

    </footer>

</body>

</html>
